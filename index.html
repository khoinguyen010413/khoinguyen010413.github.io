<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem Ghi Bàn Bóng Đá: Nhật Bản vs Hà Lan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            color: #e50914; /* Màu đỏ thể thao nổi bật */
            font-size: 2rem;
            margin-bottom: 10px;
        }

        header p {
            color: #aaa;
        }

        .main-container {
            max-width: 1000px;
            width: 100%;
            background: #262626;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Khung Video Chính */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Tỉ lệ 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
            margin-bottom: 20px;
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Khu vực 2 hình ảnh / Thumbnail */
        .image-gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .image-card {
            background: #333;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        /* Sử dụng video làm preview ảnh cho đồng bộ */
        .image-card video {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            aspect-ratio: 16/9;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .image-card video:hover {
            opacity: 1;
        }

        .image-card .tag {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(229, 9, 20, 0.8);
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
            font-weight: bold;
        }

        footer {
            margin-top: 40px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Trận Đấu Kinh Điển: Nhật Bản vs Hà Lan</h1>
        <p>Cập nhật khoảnh khắc và highlights mới nhất</p>
    </header>

    <div class="main-container">
        <div class="video-wrapper">
            <video controls autoplay muted>
                <source src="japanvshalan.mp4" type="video/mp4">
                Trình duyệt của bạn không hỗ trợ xem video này.
            </video>
        </div>

        <div class="image-gallery">
            <div class="image-card">
                <video src="japanvshalan.mp4#t=5"></video> <div class="tag">Khoảnh khắc 1</div>
            </div>
            <div class="image-card">
                <video src="japanvshalan.mp4#t=15"></video> <div class="tag">Khoảnh khắc 2</div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Bóng Đá Cực Đỉnh. Hosted on GitHub Pages.</p>
    </footer>

</body>
</html>
