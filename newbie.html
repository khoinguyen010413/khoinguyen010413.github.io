<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chào mừng Khôi Nguyên</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #0d0d0d; /* Nền tối sang trọng */
            color: #f0ece4;            /* Màu chữ trắng kem dịu mắt */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 1rem;
        }
        .welcome-text {
            font-size: clamp(1.5rem, 4vw, 2.5rem); /* Tự động co giãn theo màn hình */
            font-weight: 500;
            line-height: 1.4;
            letter-spacing: -0.01em;
            max-width: 600px;
            animation: fadeIn 1s ease-out;
        }
        /* Hiệu ứng hiện chữ mượt mà khi tải trang */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="welcome-text">
        Xin chào Khôi Nguyên, chào mừng lần đầu tạo web!
    </div>

</body>
</html>
